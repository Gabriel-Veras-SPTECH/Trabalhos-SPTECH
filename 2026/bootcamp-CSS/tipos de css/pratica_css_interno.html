<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Aula CSS - 1</title>
</head>

<style>

.card {
	width:500px;
	height: fit-content; 
	background-color: aliceblue;
	border: solid 2px navy;
	margin: 20px;
	padding: 40px;
}

.border {
	border-radius: 20px; 
}

.icone1 {
	width: 100px; 
	height: 100px;
	background-image: url('https://cdn-icons-png.flaticon.com/512/706/706830.png');
	background-size: cover;
}

.icone2 {
	width: 100px; 
	height: 100px;
	background-image: url('https://cdn-icons-png.flaticon.com/256/3681/3681928.png');
	background-size: cover;
}

h1 {
	font-family: Arial; 
	font-size: 30px;
}

p {
	font-family: Arial; 
	font-size: 15px;
}

.nome {
	color: navy;
}

.mensagem {
	font-style: italic;
	color: navy;
}

</style>

<body>

	<div class="card border">

		<div class="icone1 border">
		</div>

		<div>
			<h1>
				Meu nome é: <span class="nome">Adriana</span>
			</h1>

			<p>
				Mensagem: <span class="mensagem">A vida não é um morango!E ta tudo bem!</span>
			</p>
		</div>
	</div>

	<div class="card border">

		<div class="icone2 border">
		</div>

		<div>
			<h1>
				Meu nome é: <span class="nome">Hugo</span>
			</h1>

			<p>
				Mensagem: <span class="mensagem">Um dia é da caça, o outro é do caçador.</span>
			</p>
		</div>
	</div>

</body>

</html>
